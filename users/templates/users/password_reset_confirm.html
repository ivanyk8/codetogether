{% extends "users/auth.html" %}
{% block content %}
<div class="card">
    {% if validlink %}
        <h2>Новый пароль</h2>
        <form method="post">
            {% csrf_token %}
            <div class="form-group password-wrapper">
                <label for="id_new_password1">Пароль</label>
                <div class="input-with-icon">
                    <input
                        type="password"
                        name="new_password1"
                        id="id_new_password1"
                        placeholder="Новый пароль"
                        required
                    />
                </div>
            </div>
            <div class="form-group password-wrapper">
                <label for="id_new_password2">Повторите пароль</label>
                <div class="input-with-icon">
                    <input
                        type="password"
                        name="new_password2"
                        id="id_new_password2"
                        placeholder="Повторите новый пароль"
                        required
                    />
                </div>
            </div>
            <button type="submit" style="width: 100%;">Сбросить пароль</button>
        </form>
    {% else %}
        <h2>Ошибка</h2>
        <p style="color: #f44336;">Ссылка для сброса пароля недействительна. Возможно, она уже была использована или срок её действия истёк.</p>
        <div style="margin-top: 15px; text-align: center">
            <a href="{% url 'password_reset' %}" class="btn-register">Запросить новую ссылку</a>
        </div>
    {% endif %}
</div>
{% endblock %}
