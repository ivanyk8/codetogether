{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="csrf-token" content="{{ csrf_token }}">
        <title>CodeTogether - Редактор</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="{% static 'users/css/style.css' %}?v={% now 'U' %}">
    <style>
        #editor {
            width: 100%;
            flex: 1;
            font-size: 14px;
            min-height: 0;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            overflow: hidden;
        }
        .main-editor {
            display: flex;
            flex-direction: column;
            background: transparent;
            position: relative;
            height: 100vh;
            padding: 1.25rem;
            gap: 1rem;
        }
        .editor-header {
            height: var(--header-height);
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(18px);
            display: flex;
            align-items: center;
            padding: 0 1.25rem;
            gap: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            border-radius: 20px;
        }
        #current-filename {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
        }
        #save-status {
            margin-left: auto;
            color: var(--text-muted);
            opacity: 0;
        }
        #tab-size {
            background: rgba(0, 0, 0, 0.25);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            font-size: 0.85rem;
            padding: 0.45rem 0.75rem;
            border-radius: 12px;
            outline: none;
        }
        .fm-tree-view {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0;
        }
        .fm-item {
            padding: 6px 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-secondary);
            border-radius: 6px;
            margin: 2px 0.75rem;
            transition: var(--transition-fast);
        }
        .fm-item:hover { 
            background: var(--border-color); 
            color: var(--text-primary);
        }
        .fm-item.selected { 
            background: var(--accent-glow); 
            color: var(--accent-color); 
        }
        .fm-actions { margin-left: auto; display: none; gap: 6px; }
        .fm-item:hover .fm-actions { display: flex; }
        .fm-action-btn { 
            padding: 4px; 
            border-radius: 4px;
            opacity: 0.6;
            transition: var(--transition-fast);
            line-height: 1;
        }
        .fm-action-btn:hover { 
            opacity: 1; 
            background: var(--border-color);
            transform: scale(1.1);
        }
        #save-status { font-size: 12px; font-weight: 600; }
        .fm-item.deleting {
            animation: slideOut 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes slideOut {
            to { transform: translateX(-20px); opacity: 0; }
        }
        .upload-progress-item {
            padding: 1rem;
            background: var(--card-bg);
            border-top: 1px solid var(--border-color);
            font-size: 12px;
        }
        .progress-bar-bg {
            height: 6px;
            background: var(--bg-color);
            border-radius: 10px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-glow);
            width: 0%;
            transition: width 0.3s ease;
        }
        #upload-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(139, 92, 246, 0.1);
            backdrop-filter: blur(2px);
            border: 2px dashed var(--accent-color);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: none;
        }
        #upload-overlay::after {
            content: "🚀 Отпустите для загрузки";
            background: var(--accent-color);
            color: white;
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: var(--shadow-lg);
        }
        .fm-btn {
            background: transparent;
            color: var(--text-secondary);
            padding: 6px;
            border-radius: 6px;
        }
        .fm-btn:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }
    </style>
</head>
<body data-theme="{{ profile.theme|default:'default' }}">
    <div class="animated-mesh"></div>
    {% csrf_token %}
    <div class="editor-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="fm-container" style="display:flex; flex-direction:column; height:100%">
                <div class="fm-header">
                    <div class="user-profile-badge" style="margin-bottom: 1.5rem; padding: 0.75rem; background: rgba(255,255,255,0.03); border-radius: 16px; border: 1px solid var(--border-color);">
                        <div class="user-avatar" style="width: 32px; height: 32px; font-size: 0.9rem; border-radius: 10px; min-width: 32px;">
                            {{ user.username|slice:":1"|upper }}
                        </div>
                        <div class="user-info">
                            <span class="user-name" style="font-size: 0.9rem;">{{ user.username }}</span>
                            <span class="user-email" style="font-size: 0.7rem;">{{ user.email }}</span>
                        </div>
                    </div>
                    <div class="fm-toolbar">
                        <button class="fm-btn" id="btn-create-file" title="Новый файл"><i class="fa-solid fa-file-circle-plus"></i></button>
                        <button class="fm-btn" id="btn-create-folder" title="Новая папка"><i class="fa-solid fa-folder-plus"></i></button>
                        <button class="fm-btn" id="btn-upload-file" title="Загрузить"><i class="fa-solid fa-cloud-arrow-up"></i></button>
                        <button class="fm-btn" id="btn-refresh" title="Обновить"><i class="fa-solid fa-rotate"></i></button>
                        <button class="fm-btn" id="btn-history" title="История"><i class="fa-solid fa-clock-rotate-left"></i></button>
                        <button class="fm-btn" id="btn-fm-download" title="Скачать ZIP"><i class="fa-solid fa-file-zipper"></i></button>
                    </div>
                    <div style="margin-top: 1.25rem; position: relative;">
                        <i class="fa-solid fa-magnifying-glass" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); font-size: 0.8rem; color: var(--text-muted);"></i>
                        <input type="text" id="fm-search" placeholder="Поиск файлов..." style="padding: 0.6rem 1rem 0.6rem 2.5rem; font-size: 0.85rem; border-radius: 12px; background: rgba(0,0,0,0.2);">
                    </div>
                </div>
                
                <div id="upload-progress-container"></div>
                <div class="fm-tree-view" id="fm-tree"></div>

                <div class="sidebar-footer">
                    <button class="btn secondary" style="width:100%; font-size: 0.85rem; padding: 0.75rem;" onclick="location.href='{% url 'dashboard' %}'">
                        <i class="fa-solid fa-arrow-left"></i> В Дашборд
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-editor">
            <header class="editor-header">
                <span id="current-filename">Выберите файл</span>
                <div id="presence-bar" style="display:flex; align-items:center; gap:8px"></div>
                <div id="save-status">Сохранено</div>
                <div class="editor-options" style="display:flex; align-items:center; gap:10px">
                    <select id="tab-size">
                        <option value="2">Tab: 2</option>
                        <option value="4" selected>Tab: 4</option>
                        <option value="8">Tab: 8</option>
                    </select>
                </div>
            </header>
            <div id="editor"></div>
        </main>

        <aside class="rightbar" id="rightbar">
            <div class="rightbar-header">Участники</div>
            <div class="rightbar-body" id="participants-list"></div>
        </aside>
    </div>

    <!-- Ace Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ext-language_tools.js"></script>
    <script>
        // Global variables for main.js
        window.currentProjectId = {{ project_id }};
    </script>
    <script src="{% static 'users/js/modal.js' %}?v={% now 'U' %}"></script>
    <script src="{% static 'users/js/main.js' %}?v={% now 'U' %}"></script>
</body>
</html>
