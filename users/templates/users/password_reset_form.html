{% extends "users/auth.html" %}
{% block content %}
<div class="card">
    <div style="width: 64px; height: 64px; background: rgba(139, 92, 246, 0.1); border-radius: 20px; display: flex; align-items: center; justify-content: center; color: var(--accent-color); font-size: 1.75rem; margin: 0 auto 1.5rem;">
        <i class="fa-solid fa-key"></i>
    </div>
    <h2>Восстановление пароля</h2>
    <p>Введите ваш email, и мы отправим ссылку для сброса пароля.</p>
    
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_email">Email адрес</label>
            <input type="email" name="email" id="id_email" required placeholder="example@mail.com">
        </div>
        <button type="submit" class="primary" style="width: 100%;">Отправить ссылку</button>
    </form>
    
    {% if messages %}
        <div class="messages-container" style="margin-top: 1.5rem;">
            {% for message in messages %}
                <div class="alert {{ message.tags }} animate-fade-in" style="background: rgba(239, 68, 68, 0.1); color: var(--danger-color); padding: 1rem; border-radius: 12px; font-size: 0.9rem; border: 1px solid rgba(239, 68, 68, 0.2); display: flex; align-items: center; gap: 0.75rem;">
                    <i class="fa-solid fa-circle-exclamation"></i> {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}
    
    <div style="margin-top: 2rem; text-align: center; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
        <a href="{% url 'login' %}" class="forgot-password-link" style="color: var(--accent-color); font-weight: 600; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
            <i class="fa-solid fa-arrow-left"></i> Вернуться ко входу
        </a>
    </div>
</div>
{% endblock %}
