{% extends "users/auth.html" %}
{% block content %}
<div class="card">
    <h2>Смена пароля</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group password-wrapper">
            <label for="id_old_password">Текущий пароль</label>
            <div class="input-with-icon">
                <input type="password" name="old_password" id="id_old_password" required placeholder="Введите текущий пароль">
                <button type="button" class="toggle-password-btn" onclick="togglePassword('id_old_password')" aria-label="Показать пароль">
                    <i class="fa-solid fa-eye eye-icon"></i>
                </button>
            </div>
        </div>
        <div class="form-group password-wrapper">
            <label for="id_new_password1">Новый пароль</label>
            <div class="input-with-icon">
                <input type="password" name="new_password1" id="id_new_password1" required placeholder="Новый надежный пароль" oninput="checkPasswordStrength(this.value)">
                <button type="button" class="toggle-password-btn" onclick="togglePassword('id_new_password1')" aria-label="Показать пароль">
                    <i class="fa-solid fa-eye eye-icon"></i>
                </button>
            </div>
            <div id="password-strength" class="strength-meter">
                <div class="strength-bar"></div>
            </div>
            <span class="strength-text"></span>
        </div>
        <div class="form-group password-wrapper" style="margin-bottom: 2.5rem;">
            <label for="id_new_password2">Подтверждение</label>
            <div class="input-with-icon">
                <input type="password" name="new_password2" id="id_new_password2" required placeholder="Повторите новый пароль">
                <button type="button" class="toggle-password-btn" onclick="togglePassword('id_new_password2')" aria-label="Показать пароль">
                    <i class="fa-solid fa-eye eye-icon"></i>
                </button>
            </div>
        </div>
        <button type="submit" class="primary" style="width: 100%;">Обновить пароль</button>
    </form>
    
    {% if messages %}
        <div class="messages-container" style="margin-top: 2rem;">
            {% for message in messages %}
                <div class="alert {{ message.tags }} animate-fade-in" style="background: rgba(239, 68, 68, 0.1); color: var(--danger-color); padding: 1.25rem; border-radius: 16px; font-size: 0.95rem; border: 1px solid rgba(239, 68, 68, 0.2); display: flex; align-items: center; gap: 0.75rem;">
                    <i class="fa-solid fa-circle-exclamation"></i> {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <div style="margin-top: 2rem; text-align: center; border-top: 1px solid var(--border-color); padding-top: 2rem;">
        <a href="{% url 'dashboard' %}" class="btn secondary" style="width: 100%">
            <i class="fa-solid fa-arrow-left"></i> Вернуться в дашборд
        </a>
    </div>
</div>
{% endblock %}
